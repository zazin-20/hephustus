      const w=h(`<label class="field"><span class="lbl">${label}</span><div class="row lf-chips" style="flex-wrap:wrap;gap:6px"></div>
        <div class="row" style="gap:8px;margin-top:6px"><input class="input mono" placeholder="${ph}"><button type="button" class="btn" style="flex:none">Add</button></div></label>`);
      const draw=()=>{const c=w.querySelector('.lf-chips');c.innerHTML=v.length?'':'<span class="type-meta">No entries yet.</span>';
        v.forEach((it,i)=>{const ch=h(`<span class="chip"><span class="mono">${esc(it)}</span><button type="button" class="x">×</button></span>`);ch.querySelector('.x').onclick=()=>{v.splice(i,1);draw();};c.append(ch);});};
      const inp=w.querySelector('input');
      const addf=()=>{const x=inp.value.trim();if(!x||v.includes(x)){inp.value='';return;}v.push(x);inp.value='';draw();};
      w.querySelector('.btn').onclick=addf;
      inp.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();addf();}};
      draw();return w;
    };
    const mnt=el.querySelector('#mount');
    [['Inputs','agents/specs/028.md'],['Outputs','agents/handoffs/028.md'],['Skills','skill:tdd'],['Skill obligations','skill:tdd'],['Allowed paths','frontend/src'],['Allowed tools','shell_command']].forEach(([l,p])=>mnt.append(listField(l,p)));
    el.querySelector('#browse').onclick=()=>announce('Directory picker — desktop bridge only');
    el.querySelector('#save').onclick=()=>{el.classList.add('fx-commit');announce('Node contract saved');};
    el.querySelector('#cancel').onclick=()=>announce('Cancelled — no changes written');
    stage.append(el);
    note.textContent='Rule pills toggle enforcement; picking a model unlocks its efforts; reserved fields are motionless and say why they are disabled.';
  }});

add({id:'artifactform',group:'Forms',title:'Artifact definition form',desc:'Authors an artifact definition. Each required heading becomes an inspection predicate; min-items tightens the tolerance. Best-practices / antipatterns / examples flow to the producing node as context.',src:'frontend/src/components/ArtifactForm.jsx',
  spec:{tokens:['panel','spec-sheet','input'],motion:['commit-structural on save'],copy:'headings are tolerances the output must meet'},
  mount(stage,ctl,note){
    let heads=[{heading:'Problem Statement',required:true,min:''},{heading:'User Stories',required:true,min:'3'}];
    const el=h(`<form class="panel" onsubmit="return false" style="width:min(940px,100%);padding:16px;display:flex;flex-direction:column;gap:14px">
      <div class="row" style="justify-content:space-between;align-items:flex-end;border-bottom:1px solid var(--line-subtle);padding-bottom:10px;flex-wrap:wrap;gap:10px">
        <div><div class="type-title">Artifact definition</div>
        <span class="type-meta">spec sheet — bindable to node inputs and outputs</span></div>
        <div class="row" style="gap:8px">
          <button class="btn btn-commit" id="save">Create artifact</button>
          <button class="btn btn-ghost">Cancel</button></div></div>
      <div class="form-grid" style="grid-template-columns:1fr 1fr">
        <label class="field"><span class="lbl">Name</span><input class="input" value="PRD Spec" placeholder="Release Checklist"></label>
        <label class="field"><span class="lbl">Tags</span><input class="input" value="product" placeholder="release, qa"></label>
      </div>
      <label class="field"><span class="lbl">Required headings — inspection predicates</span><div id="heads" class="stack" style="gap:8px"></div>
        <span class="field-note">Reserved sections are added automatically: Predicates, Good Looks Like, Antipatterns, Examples.</span></label>
      <div class="form-grid" style="grid-template-columns:repeat(3,minmax(0,1fr))">
        <label class="field"><span class="lbl">Best practices</span><textarea class="input" rows="4" placeholder="Describe what good looks like."></textarea></label>
        <label class="field"><span class="lbl">Antipatterns</span><textarea class="input" rows="4" placeholder="Describe what to avoid."></textarea></label>
        <label class="field"><span class="lbl">Examples</span><textarea class="input" rows="4" placeholder="Add examples or sample bullets."></textarea></label>
      </div></form>`);
    function draw(){
      const box=el.querySelector('#heads');box.innerHTML='';
      if(!heads.length)box.append(h(`<div class="card dither" style="border-style:dashed;padding:12px"><span class="type-meta">No heading rules yet — output gate stays open.</span></div>`));
      heads.forEach((hd,i)=>{
        const r=h(`<div class="spec-sheet" style="padding:10px"><div style="display:grid;grid-template-columns:1.6fr auto auto auto;gap:8px;align-items:center">
          <input class="input hh" value="${esc(hd.heading)}" placeholder="Acceptance Criteria">
          <label class="row" style="gap:6px;border:1px solid var(--line-subtle);padding:6px 10px;font-size:12px;color:var(--text-secondary)"><input type="checkbox" class="rq" ${hd.required?'checked':''}>required</label>
          <input type="number" min="1" class="input mn" style="width:90px" value="${hd.min}" placeholder="min">
          <button type="button" class="btn btn-danger btn-sm rm">Remove</button></div></div>`);
        r.querySelector('.hh').oninput=e=>hd.heading=e.target.value;
        r.querySelector('.rq').onchange=e=>hd.required=e.target.checked;
        r.querySelector('.mn').oninput=e=>hd.min=e.target.value;
        r.querySelector('.rm').onclick=()=>{heads.splice(i,1);draw();};
        box.append(r);
      });
      const addb=h(`<button type="button" class="btn btn-sm" style="align-self:flex-start">Add heading</button>`);
      addb.onclick=()=>{heads.push({heading:'',required:true,min:''});draw();};
      box.append(addb);
    }
    el.querySelector('#save').onclick=()=>{el.classList.add('fx-commit');announce('Artifact saved → agents/artifacts/artifact-003.md');};
    stage.append(el);
    note.textContent='Add/remove headings; toggle required; set min items. Each heading is a tolerance the produced output must meet at the gate.';
    draw();
  }});

/* ================= CODE + RUN ================= */
add({id:'codeview',group:'Code + Run',title:'Code browser',desc:'Read-only repo evidence: repo select, expandable file tree, and a highlighted viewer with language and byte size. Machine-owned values in mono throughout.',src:'frontend/src/components/CodeView.jsx',
  spec:{tokens:['panel','card--inset','font-mono'],motion:['disclose-inline on dir expand']},
  mount(stage,ctl,note){
    const tree=[
      {name:'agents',type:'dir',children:[{name:'artifacts',type:'dir',children:[{name:'node-001.json',type:'file'}]}]},
      {name:'hephaestus',type:'dir',children:[{name:'workflow_runtime.py',type:'file'},{name:'store',type:'dir',children:[{name:'artifacts.py',type:'file'}]}]}];
    const FILE={content:'def apply_migrations(conn):\n    current = _schema_version(conn)\n    if current < 3:\n        conn.executescript(_SCHEMA_V3)\n        _set_schema_version(conn, 3)\n    return applied'};
    const wrap=h(`<div style="display:grid;grid-template-columns:250px 1fr;gap:12px;width:min(800px,100%)">
      <aside class="panel" style="overflow:hidden">
        <div style="border-bottom:1px solid var(--line-subtle);padding:8px 12px"><span class="lbl" style="margin:0">repo · hephustus</span></div>
        <div id="tree" style="padding:6px 0;max-height:320px;overflow:auto"></div></aside>
      <section class="panel" style="overflow:hidden">
        <header class="kv" style="border-bottom:1px solid var(--line-subtle);padding:8px 14px">
          <span class="mono" style="font-size:13px;color:var(--text-secondary)">hephaestus/workflow_runtime.py</span>
          <span class="type-meta">python · 1841 B</span></header>
        <pre id="code" class="scanlines" style="margin:0;padding:12px 16px;max-height:320px;overflow:auto;font-family:var(--font-mono);font-size:12px;line-height:1.7;background:var(--ground-0)"></pre></section></div>`);
    function renderTree(list,depth,box){
      list.forEach(e=>{
        const isDir=e.type==='dir';
        const row=h(`<div><button class="trow" style="display:flex;align-items:center;gap:6px;width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:4px 8px;padding-left:${depth*14+12}px;font-family:var(--font-mono);font-size:13.5px;color:var(--text-secondary)">
          <span style="width:10px;color:var(--text-muted)">${isDir?'+':'·'}</span><span>${e.name}</span></button><div class="kids" style="display:none"></div></div>`);
        const kids=row.querySelector('.kids');
        row.querySelector('.trow').onclick=(ev)=>{
          if(isDir){const open=kids.style.display==='block';kids.style.display=open?'none':'block';
            if(!open)kids.classList.add('fx-disclose');
            ev.currentTarget.querySelector('span').textContent=open?'+':'−';}
          else announce('Opened '+e.name);};
        if(isDir&&e.children)renderTree(e.children,depth+1,kids);
        box.append(row);
      });
    }
    renderTree(tree,0,wrap.querySelector('#tree'));
    const hl=(code)=>esc(code)
      .replace(/\b(def|if|return|import|from|class)\b/g,'<span style="color:var(--signal-stale)">$1</span>')
      .replace(/\b(\d+)\b/g,'<span style="color:var(--signal-warn)">$1</span>')
      .replace(/(_SCHEMA_V3|_schema_version|_set_schema_version|apply_migrations)/g,'<span style="color:var(--text-primary);text-shadow:var(--glow-text-live)">$1</span>');
    wrap.querySelector('#code').innerHTML=hl(FILE.content);
    stage.append(wrap);
    note.textContent='Directories disclose inline; the viewer is evidence — exact source, language, size.';
  }});

add({id:'runagent',group:'Code + Run',title:'Run agent',desc:'Fire a one-off agent: provider, tags, optional issue and working dir, prompt. Output streams as emitted lines — content / thinking / tool / error tone-coded, appended progressively.',src:'frontend/src/components/RunAgent.jsx',
  spec:{tokens:['panel','card--inset','sig-live','font-mono'],motion:['trace-stream per line','pending-scan while streaming'],copy:'stream kinds labeled, not decorated'},
  mount(stage,ctl,note){
    const EV=[
      {k:'system',c:'lifecycle',t:'run started'},
      {k:'thinking',c:'thinking',t:'Planning: inspect the failing migration.'},
      {k:'tool',c:'tool',t:'Read hephaestus/store/db.py'},
      {k:'text',c:'content',t:'The DB is a stale legacy schema; reset resolves it.'}];
    const catCol={content:'var(--text-primary)',thinking:'var(--signal-stale)',lifecycle:'var(--text-muted)',tool:'var(--signal-live)',error:'var(--signal-stop)'};
    const el=h(`<div style="display:grid;grid-template-columns:330px 1fr;gap:12px;width:min(820px,100%)">
      <aside class="panel" style="padding:16px;display:flex;flex-direction:column;gap:12px">
        <label class="field"><span class="lbl">Provider</span><select class="input"><option>claude</option><option>codex</option></select></label>
        <label class="field"><span class="lbl">Tags</span><input class="input" value="architect"></label>
        <label class="field"><span class="lbl">Issue — optional</span><input class="input mono" placeholder="issue-003"></label>
        <label class="field"><span class="lbl">Working dir — optional</span><input class="input mono" placeholder="path to target repo"></label>
        <label class="field"><span class="lbl">Prompt</span><textarea class="input" rows="5">Diagnose the desktop launch failure.</textarea></label>
        <button class="btn btn-commit" id="run">Run agent</button>
        <div class="spec-sheet" style="padding:8px 10px"><div class="kv"><span class="k">routed to</span><span class="v">claude</span></div></div></aside>
      <section class="panel" style="overflow:hidden;display:flex;flex-direction:column">
        <header class="kv" style="border-bottom:1px solid var(--line-subtle);padding:8px 14px">
          <span class="type-title" style="font-size:13px">Agent output</span>
          <span id="streamsig" style="display:none">${sig('live','streaming')}</span></header>
        <div id="out" class="scanlines" style="flex:1;padding:14px 16px;font-family:var(--font-mono);font-size:13.5px;min-height:220px;color:var(--text-muted);background:var(--ground-0);line-height:1.8">Configure a task and run an agent. Output streams here.</div></section></div>`);
    el.querySelector('#run').onclick=()=>{
      const out=el.querySelector('#out');out.innerHTML='';out.classList.add('pending-scan','stream-hold');
      el.querySelector('#streamsig').style.display='inline';
      let i=0;
      const tick=()=>{
        if(i>=EV.length){el.querySelector('#streamsig').style.display='none';out.classList.remove('pending-scan','stream-hold');return;}
        const e=EV[i++];
        out.append(h(`<div class="fx-stream" style="color:${catCol[e.c]};position:relative;z-index:2"><span style="color:var(--text-muted)">[${e.k}] </span>${esc(e.t)}</div>`));
        setTimeout(tick,420);
      };
      tick();
    };
    stage.append(el);
    note.textContent='New lines emit with trace-stream; existing lines never re-animate. Pending-scan runs only while the stream is genuinely unresolved.';
  }});

/* ================= NOT MOUNTED ================= */
add({id:'dashboard',group:'Not mounted',title:'Pipeline dashboard',desc:'Per-issue grid of stage markers (Spec / Handoff / Review / QA / Log). Exists in the codebase but is not wired into the current nav.',src:'frontend/src/components/Dashboard.jsx (unmounted)',
  spec:{tokens:['panel','sig-*','marker-serial']},
  mount(stage){
    const stageSig=(k,s)=>s==='ok'?sig('pass',k):s==='pending'?sig('warn',k):`<span class="sig" style="opacity:.55">${k}</span>`;
    const issues=[
      {id:'issue-028',state:sig('pass','done'),title:'Node authoring',stages:{spec:'ok',handoff:'ok',review:'ok',qa:'ok',log:'ok'}},
      {id:'issue-029',state:sig('stale','qa pending'),title:'Artifact authoring',stages:{spec:'ok',handoff:'ok',review:'ok',qa:'pending',log:'none'}}];
    const el=h(`<section class="panel" style="width:min(680px,100%)">
      <header class="kv" style="border-bottom:1px solid var(--line-subtle);padding:10px 16px">
        <span class="type-title" style="font-size:13px">Pipeline dashboard</span><span class="type-meta">${issues.length} issues</span></header>
      <div id="b"></div></section>`);
    const b=el.querySelector('#b');
    issues.forEach(it=>{
      b.append(h(`<div style="display:flex;justify-content:space-between;gap:16px;align-items:center;padding:12px 16px;border-top:1px solid var(--line-subtle)">
        <div><div class="row" style="gap:8px">${serial(it.id)}${it.state}</div><div style="margin-top:4px;font-size:13px;color:var(--text-primary)">${it.title}</div></div>
        <div class="row" style="gap:5px">${['spec','handoff','review','qa','log'].map(k=>stageSig(k,it.stages[k])).join('')}</div></div>`));
    });
    stage.append(el);
  }});

add({id:'violations',group:'Not mounted',title:'Compliance monitor',desc:'Sorted open violations with rule id, severity, message, fix hint, and the touched artifact. The all-clear state is calm and still — no celebration.',src:'frontend/src/components/Violations.jsx (unmounted)',
  spec:{tokens:['panel','sig-stop','sig-warn','marker-serial'],motion:['alarm-hard on new violation','calm resolution when clear'],copy:'violations name the rule and the fix'},
  mount(stage,ctl,note){
    let empty=false;
    const V=[
      {rule_id:'G-001',severity:'stop',issue_id:'issue-029',message:'Write outside allowed paths.',fix:'Add frontend/src to allowed_paths.',artifact:'frontend/src/api.js'},
      {rule_id:'G-003',severity:'warn',issue_id:'issue-029',message:'Skill obligation tdd not declared.',fix:'Add skill:tdd to obligations.',artifact:'node-002'}];
    function draw(){
      stage.innerHTML='';
      const el=h(`<section class="panel" style="width:min(600px,100%)">
        <header class="kv" style="border-bottom:1px solid var(--line-subtle);padding:10px 16px">
          <span class="type-title" style="font-size:13px">Compliance monitor</span>
          ${empty?sig('pass','0 open'):sig('stop',V.length+' open')}</header>
        <div id="b"></div></section>`);
      const b=el.querySelector('#b');
      if(empty){
        b.append(h(`<div class="dither" style="padding:40px 20px;text-align:center">
          <div class="mono" style="font-size:13px;color:var(--signal-pass)">ALL CHECKS PASSED</div>
          <p class="type-meta" style="margin:6px 0 0">No open violations. Nothing requires attention.</p></div>`));
      }else{
        V.forEach(v=>b.append(h(`<div class="${v.severity==='stop'?'fx-alarm-hard fx-glitch':''}" style="padding:12px 16px;border-top:1px solid var(--line-subtle);border-left:2px solid ${v.severity==='stop'?'var(--stop-58)':'var(--warn-52)'}">
          <div class="row" style="gap:8px;flex-wrap:wrap">${sig(v.severity,v.severity==='stop'?'violation':'caution')}${serial(v.rule_id)}${serial(v.issue_id)}</div>
          <p style="margin:8px 0 0;font-size:13px;color:var(--text-primary)">${v.message}</p>
          <p class="type-meta" style="margin:3px 0 0">fix: ${v.fix}</p>
          <p class="mono" style="margin:3px 0 0;font-size:12px;color:var(--text-muted)">${v.artifact}</p></div>`)));
      }
      stage.append(el);
    }
    ctl.append(segCtl([{key:'open',label:'2 open'},{key:'clear',label:'all clear'}],'open',k=>{empty=k==='clear';draw();}));
    note.textContent='Each violation names the rule, the fix, and the touched artifact. The empty state is deliberately motionless.';
    draw();
  }});

/* ============================================================
   SHELL WIRING
   ============================================================ */
const groups=[...new Set(C.map(c=>c.group))];
const nav=$('#nav');
let activeId=null;

function buildNav(q){
  nav.innerHTML='';
  const query=(q||'').toLowerCase();
  groups.forEach(g=>{
    const items=C.filter(c=>c.group===g&&(!query||c.title.toLowerCase().includes(query)||c.id.includes(query)));
    if(!items.length)return;
    const grp=h(`<div class="nav-group"><h2>${esc(g)}</h2></div>`);
    items.forEach(c=>{
      const idx=String(C.indexOf(c)+1).padStart(2,'0');
      const b=h(`<button class="nav-item${c.id===activeId?' active':''}" data-id="${c.id}"><span class="idx">${idx}</span><span>${esc(c.title)}</span></button>`);
      b.onclick=()=>select(c.id);
      grp.append(b);
    });
    nav.append(grp);
  });
}

function select(id){
  const c=C.find(x=>x.id===id)||C[0];
  activeId=c.id;
  try{history.replaceState(null,'','#'+c.id);}catch(e){/* hash sync unavailable in this context */}
  nav.querySelectorAll('.nav-item').forEach(x=>x.classList.toggle('active',x.dataset.id===c.id));
  $('#crumb').textContent=c.group+' / unit '+String(C.indexOf(c)+1).padStart(2,'0');
  $('#title').textContent=c.title;
  $('#desc').textContent=c.desc;
  $('#srcref').innerHTML=esc(c.src||'');
  const spec=$('#spec');
  const s=c.spec||{};
  spec.innerHTML=
    (s.tokens?`<span><b>tokens</b>${s.tokens.map(t=>`<span class="tok">${esc(t)}</span>`).join(' · ')}</span>`:'')+
    (s.motion?`<span><b>motion</b>${s.motion.map(m=>`<span class="fam">${esc(m)}</span>`).join(' · ')}</span>`:'')+
    (s.copy?`<span><b>copy</b>${esc(s.copy)}</span>`:'');
  spec.style.display=(s.tokens||s.motion||s.copy)?'flex':'none';
  const stage=$('#stage'),ctl=$('#ctl'),note=$('#ctlnote');
  stage.innerHTML='';ctl.innerHTML='';note.textContent='';
  stage.classList.remove('fx-transit');void stage.offsetWidth;stage.classList.add('fx-transit');
  try{c.mount(stage,ctl,note);}catch(err){stage.innerHTML='<div class="sig sig-stop">mount failed</div><pre class="mono muted" style="font-size:13px">'+esc(err.message)+'</pre>';}
}

$('#filter').addEventListener('input',e=>buildNav(e.target.value));
buildNav('');
const initial=location.hash?location.hash.slice(1):null;
select(initial&&C.some(c=>c.id===initial)?initial:C[0].id);
})();
</script>
